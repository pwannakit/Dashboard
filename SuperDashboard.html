<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการโครงการ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f1f5f9; }
        .nav-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .nav-btn.active { 
            background-color: #4f46e5; 
            color: white; 
            border-color: #4f46e5; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); 
        }
        
        #content-frame { 
            width: 100%; 
            height: calc(100vh - 110px); 
            border: none; 
            background-color: transparent;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-screen">

    <!-- 1. ส่วนชื่อโครงการ (Top Bar) - จัดกึ่งกลาง -->
    <div class="bg-indigo-900 text-white h-10 flex items-center justify-center px-4 shadow-inner text-center">
        <span class="text-xs md:text-sm lg:text-base font-semibold tracking-wide">
            โครงการก่อสร้างทางพิเศษฉลองรัฐส่วนต่อขยาย (ช่วงจตุโชติ - ถนนลำลูกกา)
        </span>
    </div>

    <!-- 2. ส่วนเมนูนำทาง (Navigation Bar) - ปรับเป็นจัดกึ่งกลาง -->
    <header class="bg-white shadow-md z-30 h-[70px] px-4 flex items-center justify-center border-b border-slate-200">
        
        <!-- Desktop Menu: จัดกึ่งกลางด้วยการไม่ใช้ justify-between -->
        <div class="hidden md:flex items-center gap-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
            <button onclick="loadDashboard('BoredPile_App.html', this)" class="nav-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-200">
                🏗️ เสาเข็มเจาะ
            </button>
            <button onclick="loadDashboard('Sonic.html', this)" class="nav-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-200">
                📡 Sonic & Grouting
            </button>
            <button onclick="loadDashboard('Pilecap.html', this)" class="nav-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-200">
                🧱 ฐานราก (Pilecap)
            </button>
            <button onclick="loadDashboard('Column.html', this)" class="nav-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-200">
                🏛️ เสา (Column)
            </button>
        </div>

        <!-- Mobile Menu Button: จัดกึ่งกลางบนมือถือ -->
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden px-6 py-2 rounded-lg bg-slate-100 text-slate-600 font-bold border border-slate-200 text-sm shadow-sm active:bg-slate-200">
            ☰ เลือกเมนูระบบ
        </button>

    </header>

    <!-- Mobile Menu Overlay (แสดงใต้ Header) -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-200 shadow-2xl absolute w-full z-20 top-[110px]">
        <div class="flex flex-col p-2 gap-1 text-center">
            <button onclick="loadDashboard('BoredPile_App.html', this, true)" class="mobile-nav-btn py-4 rounded-lg text-sm font-bold">
                🏗️ เสาเข็มเจาะ
            </button>
            <button onclick="loadDashboard('Sonic.html', this, true)" class="mobile-nav-btn py-4 rounded-lg text-sm font-bold border-t border-slate-50">
                📡 Sonic & Grouting
            </button>
            <button onclick="loadDashboard('Pilecap.html', this, true)" class="mobile-nav-btn py-4 rounded-lg text-sm font-bold border-t border-slate-50">
                🧱 ฐานราก (Pilecap)
            </button>
            <button onclick="loadDashboard('Column.html', this, true)" class="mobile-nav-btn py-4 rounded-lg text-sm font-bold border-t border-slate-50">
                🏛️ เสา (Column)
            </button>
        </div>
    </div>

    <!-- 3. พื้นที่แสดงเนื้อหา (Content Area) -->
    <main class="flex-1 w-full bg-slate-200 relative overflow-hidden">
        <iframe id="content-frame" src="about:blank" title="Viewer" allowfullscreen></iframe>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const lastPage = localStorage.getItem('last-page') || 'BoredPile_App.html';
            loadDashboard(lastPage);
        });

        function loadDashboard(fileName, btnElement, isMobile = false) {
            const iframe = document.getElementById('content-frame');
            if (iframe.src.includes(fileName) && fileName !== 'about:blank') return;

            iframe.style.opacity = '0';

            setTimeout(() => {
                iframe.src = fileName;
                localStorage.setItem('last-page', fileName);
                updateActiveButtons(fileName);
                
                if (isMobile) {
                    document.getElementById('mobile-menu').classList.add('hidden');
                }
            }, 50);
        }

        function updateActiveButtons(fileName) {
            const allBtns = document.querySelectorAll('.nav-btn, .mobile-nav-btn');
            
            allBtns.forEach(btn => {
                const isActive = btn.getAttribute('onclick').includes(fileName);
                
                if (btn.classList.contains('nav-btn')) {
                    btn.classList.toggle('active', isActive);
                } else {
                    if (isActive) {
                        btn.className = "mobile-nav-btn py-4 rounded-lg text-sm font-bold bg-indigo-50 text-indigo-700";
                    } else {
                        btn.className = "mobile-nav-btn py-4 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100";
                    }
                }
            });
        }

        document.getElementById('content-frame').addEventListener('load', function() {
            this.style.opacity = '1';
        });
    </script>
</body>
</html>
