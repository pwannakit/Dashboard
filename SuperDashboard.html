<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Dashboard - ศูนย์บัญชาการโครงการ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; margin: 0; padding: 0; overflow: hidden; }
        .nav-btn { transition: all 0.3s ease; }
        .nav-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        .dark .nav-btn.active { background-color: #6366f1; color: white; border-color: #6366f1; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
        
        /* Iframe styling */
        #content-frame { width: 100%; height: calc(100vh - 80px); border: none; background-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 flex flex-col h-screen">

    <header class="bg-white dark:bg-slate-800 shadow-md z-10 h-20 px-4 md:px-8 flex items-center justify-between border-b border-slate-200 dark:border-slate-700">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2.5 rounded-lg text-xl shadow-sm">🏢</div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-indigo-900 dark:text-indigo-400 leading-tight">Super Dashboard</h1>
                <p class="text-xs md:text-sm text-slate-500 dark:text-slate-400">Project Management Portal</p>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-2 lg:gap-3 bg-slate-50 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
            <button onclick="loadDashboard('BoredPile_App.html', this)" class="nav-btn active px-4 py-2 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent">
                🏗️ เสาเข็มเจาะ
            </button>
            <button onclick="loadDashboard('Sonic.html', this)" class="nav-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent">
                📡 Sonic & Grouting
            </button>
            <button onclick="loadDashboard('Pilecap.html', this)" class="nav-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent">
                🧱 ฐานราก (Pilecap)
            </button>
            <button onclick="loadDashboard('Column.html', this)" class="nav-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent">
                🏛️ เสา (Column)
            </button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-lg bg-slate-100 dark:bg-slate-700 shadow-sm hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors border border-slate-200 dark:border-slate-600 text-lg" title="สลับโหมดมืด/สว่าง">
                <span id="theme-icon">🌙</span>
            </button>
            
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-2.5 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">
                ☰
            </button>
        </div>
    </header>

    <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-md absolute w-full z-20 top-20">
        <div class="flex flex-col p-2 gap-1">
            <button onclick="loadDashboard('BoredPile_App.html', this, true)" class="mobile-nav-btn active text-left px-4 py-3 rounded-lg text-sm font-bold bg-indigo-50 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300">
                🏗️ เสาเข็มเจาะ
            </button>
            <button onclick="loadDashboard('Sonic.html', this, true)" class="mobile-nav-btn text-left px-4 py-3 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
                📡 Sonic & Grouting
            </button>
            <button onclick="loadDashboard('Pilecap.html', this, true)" class="mobile-nav-btn text-left px-4 py-3 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
                🧱 ฐานราก (Pilecap)
            </button>
            <button onclick="loadDashboard('Column.html', this, true)" class="mobile-nav-btn text-left px-4 py-3 rounded-lg text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
                🏛️ เสา (Column)
            </button>
        </div>
    </div>

    <main class="flex-1 w-full bg-slate-200 dark:bg-slate-900/50 relative">
        <iframe id="content-frame" src="BoredPile_App.html" title="Dashboard Viewer" allowfullscreen></iframe>
    </main>

    <script>
        // ระบบจัดการโหมดมืด-สว่าง (ส่งต่อไปยัง iframe เพื่อให้ธีมตรงกัน)
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';

            // พยายามสลับโหมดใน iframe ด้วย (ทำงานได้ดีเมื่อเปิดผ่าน Web Server หรือ Localhost)
            try {
                const iframe = document.getElementById('content-frame');
                if (iframe.contentWindow) {
                    const iframeHtml = iframe.contentWindow.document.documentElement;
                    if (isDark) {
                        iframeHtml.classList.add('dark');
                    } else {
                        iframeHtml.classList.remove('dark');
                    }
                    
                    // เรียกฟังก์ชัน toggleDarkMode() ในไฟล์ย่อย (ถ้ามี) เพื่อให้กราฟอัปเดตสีตาม
                    if(typeof iframe.contentWindow.toggleDarkMode === 'function') {
                        // ป้องกันการทำงานซ้ำซ้อน เพราะไฟล์ย่อยอาจจะไปเปลี่ยน class ตัวเองอีกรอบ
                        // เราใช้วิธีกระตุ้นให้มันเปลี่ยนกราฟ
                        iframe.contentWindow.toggleDarkMode(); 
                        iframeHtml.className = isDark ? 'dark' : 'light'; 
                    }
                }
            } catch(e) {
                console.log("ไม่สามารถสั่งเปลี่ยนโหมดใน iframe ได้โดยตรง (อาจติดเรื่องการอ่านไฟล์ Local โดยตรง)");
            }
        }

        // ระบบสลับหน้า Dashboard
        function loadDashboard(fileName, btnElement, isMobile = false) {
            // 1. โหลดเนื้อหาไฟล์นั้นใส่เข้าไปในพื้นที่ iframe
            const iframe = document.getElementById('content-frame');
            iframe.src = fileName;

            // 2. จัดการสีปุ่มเมนูบน Desktop
            if (!isMobile && btnElement) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                btnElement.classList.add('active');
            }

            // 3. จัดการสีปุ่มเมนูบน Mobile
            if (isMobile && btnElement) {
                document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
                    btn.classList.remove('bg-indigo-50', 'text-indigo-700', 'dark:bg-indigo-900/50', 'dark:text-indigo-300');
                    btn.classList.add('text-slate-600', 'dark:text-slate-300');
                });
                btnElement.classList.remove('text-slate-600', 'dark:text-slate-300');
                btnElement.classList.add('bg-indigo-50', 'text-indigo-700', 'dark:bg-indigo-900/50', 'dark:text-indigo-300');
                
                // ปิดเมนูมือถือหลังจากเลือกเสร็จ
                document.getElementById('mobile-menu').classList.add('hidden');
                
                // อัปเดตสีปุ่ม Desktop ให้ตรงกันด้วย
                const idx = Array.from(btnElement.parentNode.children).indexOf(btnElement);
                document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                    if (i === idx) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }
        }

        // ตรวจจับเมื่อหน้าใน iframe โหลดเสร็จ ให้ซิงค์ Dark Mode ทันที
        document.getElementById('content-frame').addEventListener('load', function() {
            const isDark = document.documentElement.classList.contains('dark');
            try {
                const iframeHtml = this.contentWindow.document.documentElement;
                if (isDark) {
                    iframeHtml.classList.add('dark');
                } else {
                    iframeHtml.classList.remove('dark');
                }
            } catch(e) {
                // ข้ามไปหากเปิดไฟล์แบบตรงๆ (Local file) แล้วติดนโยบายความปลอดภัยของเบราว์เซอร์
            }
        });
    </script>
</body>
</html>
