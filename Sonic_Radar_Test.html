<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Spatial Map (From V2.1.3)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .custom-marker {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 10px;
        }
        .custom-marker:hover { transform: scale(1.3); z-index: 1000 !important; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-6 text-slate-800">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-500">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🗺️ พิกัดเสาเข็มเจาะ (Standalone Map)</h1>
                <p class="text-slate-500 text-sm mt-1">ดึงเฉพาะโมดูลแผนที่จาก V2.1.3 เพื่อนำไปพัฒนาต่อ</p>
            </div>
            <div id="loading-status" class="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold border border-blue-200">
                ⏳ กำลังโหลดข้อมูล...
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
            <div class="flex items-center gap-3">
                <label class="font-bold text-sm text-slate-700">🔍 เลือกโซน:</label>
                <select id="mapZoneFilter" onchange="renderMap()" class="p-2 rounded-lg border border-slate-300 bg-slate-50 outline-none text-sm min-w-[150px]">
                    <option value="ALL">ภาพรวมทุกโซน</option>
                </select>
            </div>
            
            <div class="flex items-center gap-3 bg-slate-100 p-2 px-4 rounded-lg border border-slate-200 text-xs font-bold">
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-emerald-500"></div><span class="text-emerald-700">เสร็จ: <span id="count-done">0</span></span></div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-orange-500"></div><span class="text-orange-700">กำลังทำ: <span id="count-wip">0</span></span></div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-slate-400"></div><span class="text-slate-600">รอดำเนินการ: <span id="count-pending">0</span></span></div>
            </div>
        </div>
        
        <div id="map" class="w-full rounded-xl z-0" style="height: 600px; border: 1px solid #cbd5e1;"></div>
    </div>

    <script>
        // ลิงก์ฐานข้อมูลเสาเข็มเจาะ
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_d3Oxo9_vdxQGl2R1aIT8U-2RarYs_Iy2MANCwBi9Dnop58DvSD7tTiRlNf-vRhYupbxeCG4V_Mwc/pub?gid=921370860&single=true&output=csv";

        // ตั้งค่าการกรอง Zone (จาก V2.1.3)
        const EXCLUDED_ZONES_CONFIG = {
            "เข็ม-แซม (Re-Drilling Pile)": ["แซม", "เข็มแซม", "เข็ม-แซม"],
            "ยังไม่เริ่ม-เจาะ (Not Started)": ["ยังไม่เริ่ม", "ยังไม่เริ่มเจาะ", "ยังไม่เริ่ม-เจาะ"],
            "พบปัญหา-รอแก้ไข (Pending Fix)": ["พบปัญหา", "รอแก้ไข", "ติดปัญหา"]
        };

        let map, markerLayerGroup;
        let groupedPileData = [];

        // 1. ฟังก์ชันจัดฟอร์แมตชื่อโซน
        function getStandardZoneName(rawZone) {
            if (!rawZone) return 'ไม่ระบุ';
            const text = String(rawZone).toUpperCase().replace(/\s+/g, '');
            for (const [standardName, keywords] of Object.entries(EXCLUDED_ZONES_CONFIG)) {
                if (keywords.some(kw => text.includes(kw.toUpperCase().replace(/\s+/g, '')))) return standardName;
            }
            if (text.includes("ZONE1")) return "Zone 1"; if (text.includes("ZONE2")) return "Zone 2"; if (text.includes("ZONE3")) return "Zone 3"; if (text.includes("ZONE4")) return "Zone 4"; if (text.includes("ZONE5")) return "Zone 5"; if (text.includes("ZONE6")) return "Zone 6"; if (text.includes("ZONE7")) return "Zone 7";
            if (text.includes("N01")) return "Ramp-N01"; if (text.includes("OR3")) return "Ramp-OR3"; if (text.includes("OR4")) return "Ramp-OR4"; if (text.includes("OR6")) return "Ramp-OR6"; if (text.includes("OR7")) return "Ramp-OR7"; if (text.includes("SR1")) return "Ramp-SR1";
            return rawZone;
        }

        function isExcludedZone(zone) {
            if (!zone) return false;
            return Object.keys(EXCLUDED_ZONES_CONFIG).includes(zone);
        }

        // 2. ฟังก์ชันจัดฟอร์แมตชื่อเสาเข็ม
        function formatPileName(rawName) {
            const match1 = rawName.match(/(.+)\/(\d+)-dia([\d\.]+)/i);
            if (match1) return `${match1[1]} No.B${match1[2]} (${match1[3]} m.)`;
            const match2 = rawName.match(/(.+)\/(\d+)/i);
            if (match2) return `${match2[1]} No.B${match2[2]}`;
            return rawName;
        }

        // 3. เตรียมแผนที่
        function initMap() {
            map = L.map('map').setView([13.9540, 100.5170], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);

            // โหลดข้อมูลทันที
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    document.getElementById('loading-status').className = "bg-emerald-50 text-emerald-700 px-4 py-2 rounded-lg text-sm font-bold border border-emerald-200";
                    document.getElementById('loading-status').innerHTML = "✅ โหลดข้อมูลสำเร็จ";
                    processGroupedMapData(results.data);
                },
                error: (err) => {
                    document.getElementById('loading-status').className = "bg-red-50 text-red-700 px-4 py-2 rounded-lg text-sm font-bold border border-red-200";
                    document.getElementById('loading-status').innerHTML = "❌ โหลดข้อมูลไม่สำเร็จ";
                    console.error(err);
                }
            });
        }

        // 4. สกัดข้อมูลพิกัด (ลอจิกเดิม V2.1.3 100%)
        function processGroupedMapData(data) {
            const tempGroups = {};
            const mapZones = new Set();

            data.forEach(row => {
                const projName = row['ชื่อโปรเจค'];
                const rawZone = row['ผู้รับผิดชอบ'] || 'ไม่ระบุ';
                const finishDate = row['วันที่เสร็จงานจริงๆ'] || '';
                const lat = parseFloat(row['Latitude']);
                const lng = parseFloat(row['Longitude']);

                if (projName) {
                    let baseName = projName;
                    if (baseName.includes('/')) baseName = baseName.split('/')[0].trim();
                    else {
                        const diaIndex = baseName.toLowerCase().indexOf('-dia');
                        if (diaIndex !== -1) baseName = baseName.substring(0, diaIndex).trim();
                    }

                    const zone = getStandardZoneName(rawZone);
                    
                    if (!isExcludedZone(zone)) {
                        mapZones.add(zone);
                    }

                    if (!tempGroups[baseName]) tempGroups[baseName] = { baseName: baseName, zone: zone, lat: null, lng: null, piles: [] };
                    if (!isNaN(lat) && !isNaN(lng)) { tempGroups[baseName].lat = lat; tempGroups[baseName].lng = lng; }

                    tempGroups[baseName].piles.push({ id: projName, isCompleted: finishDate.trim() !== '', date: finishDate.trim() !== '' ? finishDate : '-', status: rawZone });
                }
            });

            groupedPileData = Object.values(tempGroups).filter(group => group.lat !== null && group.lng !== null);

            const select = document.getElementById('mapZoneFilter');
            select.innerHTML = '<option value="ALL">ภาพรวมทุกโซน</option>';
            
            const sortedZones = Array.from(mapZones).sort((a, b) => {
                const getRank = (name) => { if (name.startsWith('Zone')) return 1; if (name.startsWith('Ramp')) return 2; return 3; };
                if (getRank(a) !== getRank(b)) return getRank(a) - getRank(b); 
                return (parseInt(a.replace(/[^\d]/g, '')) || 0) - (parseInt(b.replace(/[^\d]/g, '')) || 0);
            });
            sortedZones.forEach(zone => { select.innerHTML += `<option value="${zone}">${zone}</option>`; });

            renderMap();
        }

        // 5. วาดแผนที่และหมุด
        function renderMap() {
            markerLayerGroup.clearLayers();
            const selectedZone = document.getElementById('mapZoneFilter').value;
            let done = 0, wip = 0, pending = 0; const bounds = []; 

            groupedPileData.forEach(group => {
                if (selectedZone !== 'ALL' && group.zone !== selectedZone) return;

                const totalPiles = group.piles.length, completedPiles = group.piles.filter(p => p.isCompleted).length;
                let sColor = '#94a3b8', sText = 'รอดำเนินการ', bgClass = 'bg-slate-100 text-slate-600';

                if (completedPiles === totalPiles) { done++; sColor = '#10b981'; sText = 'เสร็จสมบูรณ์'; bgClass = 'bg-emerald-100 text-emerald-800'; } 
                else if (completedPiles > 0) { wip++; sColor = '#f97316'; sText = 'กำลังดำเนินการ'; bgClass = 'bg-orange-100 text-orange-800'; } 
                else { pending++; }
                
                const customIcon = L.divIcon({ className: 'custom-marker', html: `<div style="background-color: ${sColor}; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.9;"><span>${totalPiles}</span></div>`, iconSize: [20, 20] });
                const marker = L.marker([group.lat, group.lng], { icon: customIcon });

                let pHTML = '<ul class="mt-2 space-y-1.5 max-h-48 overflow-y-auto custom-scrollbar pr-2">';
                group.piles.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true})).forEach(p => {
                    const icon = p.isCompleted ? '<span class="text-emerald-500 text-[10px]">✅</span>' : '<span class="text-slate-400 text-[10px]">⏳</span>';
                    
                    let pileText = `<b class="text-xs">${formatPileName(p.id)}</b>`;
                    if (!p.isCompleted && p.status && p.status !== 'ไม่ระบุ') {
                        pileText += ` <span class="text-[10px] text-orange-500 font-medium ml-1">${p.status}</span>`;
                    }
                    
                    pHTML += `<li class="text-sm text-slate-700 border-b border-slate-100 pb-1 flex justify-between items-center"><span class="flex items-center gap-1">${icon} ${pileText}</span><span class="text-[10px] text-slate-500 bg-slate-50 px-1.5 py-0.5 rounded">${p.date}</span></li>`;
                }); pHTML += '</ul>';

                marker.bindPopup(`<div class="p-3 min-w-[240px]"><h4 class="font-bold text-lg text-slate-800 border-b border-slate-200 pb-1 mb-2">📌 กลุ่มเสา: ${group.baseName}</h4><div class="mb-2 flex justify-between"><span class="px-2 py-0.5 rounded font-bold text-[11px] ${bgClass}">${sText}</span><span class="text-[11px] font-bold text-slate-500">(${completedPiles}/${totalPiles})</span></div>${pHTML}</div>`);
                markerLayerGroup.addLayer(marker); bounds.push([group.lat, group.lng]);
            });

            document.getElementById('count-done').innerText = done; document.getElementById('count-wip').innerText = wip; document.getElementById('count-pending').innerText = pending;
            if (bounds.length > 0) { map.fitBounds(bounds, { padding: [50, 50], maxZoom: 18 }); }
        }

        // โหลดทุกอย่างเมื่อเปิดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
