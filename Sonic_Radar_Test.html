<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Sonic Radar (Smart Cross-Match)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .custom-marker {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
        }
        .custom-marker:hover { transform: scale(1.3); z-index: 1000 !important; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-6 text-slate-800">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-2xl shadow-lg border-t-4 border-red-500">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🗺️</span>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">พิกัดเสารอทดสอบ (Sonic Radar)</h1>
                    <p class="text-slate-500 text-sm mt-0.5">แสดงเฉพาะเสาเข็มที่อายุเกิน 14 วัน และยังไม่ได้ทำการทดสอบ</p>
                </div>
            </div>
            <div id="loading-status" class="bg-red-50 text-red-700 px-5 py-2.5 rounded-lg text-sm font-bold border border-red-200 shadow-sm w-full md:w-auto text-center flex items-center justify-center gap-2">
                <span class="animate-pulse">⏳</span> รอเริ่มการทำงาน...
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <label class="font-bold text-sm text-slate-700">🔍 เลือกโซน:</label>
                <select id="mapZoneFilter" onchange="renderMap()" class="flex-1 md:flex-none p-2 rounded-lg border border-slate-300 bg-white outline-none text-sm min-w-[180px] focus:border-red-500 shadow-sm">
                    <option value="ALL">ภาพรวมทุกโซน</option>
                </select>
            </div>
            
            <div class="flex items-center gap-2 bg-red-100/50 p-2 px-4 rounded-lg border border-red-200 text-sm font-bold shadow-sm">
                <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-red-700">🚨 รอทดสอบ (เกิน 14 วัน): <span id="count-pending" class="text-lg">0</span> ต้น</span>
            </div>
        </div>
        
        <div id="map" class="w-full rounded-xl z-0 shadow-inner" style="height: 600px; border: 1px solid #cbd5e1;"></div>
    </div>

    <script>
        // ==========================================
        // 🌟 ลิงก์ฐานข้อมูลทั้ง 2 ฝั่ง 🌟
        // ==========================================
        // ไฟล์ที่ 1: ตาราง Pending (เอาไว้ดึงรายชื่อเสา 150 ต้น)
        const PENDING_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzJ44c5wXJlotG5S0SsFqlEncFgYDrhMbjDlJvgN1j_fgnjwPC8p8FnNquiTwQ_FGytzP81jZ1kICG/pub?gid=921370860&single=true&output=csv";
        // ไฟล์ที่ 2: ตาราง Bored Pile (เอาไว้เทียบรายชื่อ เพื่อดึง Latitude / Longitude)
        const BORED_PILE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_d3Oxo9_vdxQGl2R1aIT8U-2RarYs_Iy2MANCwBi9Dnop58DvSD7tTiRlNf-vRhYupbxeCG4V_Mwc/pub?gid=921370860&single=true&output=csv";

        let pendingPileTargets = {}; // ตัวแปรเก็บรายชื่อเป้าหมาย "บัญชีดำ" ที่รอทดสอบ
        let map, markerLayerGroup;
        let groupedPileData = [];

        const EXCLUDED_ZONES_CONFIG = {
            "เข็ม-แซม (Re-Drilling Pile)": ["แซม", "เข็มแซม", "เข็ม-แซม"],
            "ยังไม่เริ่ม-เจาะ (Not Started)": ["ยังไม่เริ่ม", "ยังไม่เริ่มเจาะ", "ยังไม่เริ่ม-เจาะ"],
            "พบปัญหา-รอแก้ไข (Pending Fix)": ["พบปัญหา", "รอแก้ไข", "ติดปัญหา"]
        };

        // ==========================================
        // 🛠️ เครื่องมือฟอกข้อมูล (Utilities)
        // ==========================================
        // ตัวฟอกชื่อเสาเข็มให้ตรงกันทั้ง 2 ฝั่ง
        function getMatchKey(name) {
            if (!name) return '';
            let clean = String(name).toUpperCase();
            clean = clean.split(/-DIA/)[0]; // ตัด -dia ออก
            return clean.replace(/\s+/g, ''); // ตัดช่องว่างออกให้หมด (เช่น 71L/1-dia1.20 กลายเป็น 71L/1)
        }

        // แปลงวันที่ภาษาไทย
        function parseThaiDate(dateStr) {
            if (!dateStr) return null;
            let str = dateStr.toString().trim().replace(/"/g, '');
            let parts = str.split(/[\/\- ]+/); 
            if (parts.length < 3) return null;
            let day = parseInt(parts[0], 10), monthStr = parts[1].trim(), year = parseInt(parts[2], 10);
            if (year < 100) year += 2000;
            if (year > 2500) year -= 543;
            const thaiMonths = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };
            let month = thaiMonths[monthStr] !== undefined ? thaiMonths[monthStr] : (parseInt(monthStr, 10) - 1); 
            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
            return new Date(year, month, day, 0, 0, 0, 0);
        }

        // คำนวณอายุคอนกรีต
        function getDiffDays(dateString) {
            const pileDate = parseThaiDate(dateString);
            if (!pileDate) return -1;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = today.getTime() - pileDate.getTime();
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        function getStandardZoneName(rawZone) {
            if (!rawZone) return 'ไม่ระบุ';
            const text = String(rawZone).toUpperCase().replace(/\s+/g, '');
            for (const [standardName, keywords] of Object.entries(EXCLUDED_ZONES_CONFIG)) {
                if (keywords.some(kw => text.includes(kw.toUpperCase().replace(/\s+/g, '')))) return standardName;
            }
            if (text.includes("ZONE1")) return "Zone 1"; if (text.includes("ZONE2")) return "Zone 2"; if (text.includes("ZONE3")) return "Zone 3"; if (text.includes("ZONE4")) return "Zone 4"; if (text.includes("ZONE5")) return "Zone 5"; if (text.includes("ZONE6")) return "Zone 6"; if (text.includes("ZONE7")) return "Zone 7";
            if (text.includes("N01")) return "Ramp-N01"; if (text.includes("OR3")) return "Ramp-OR3"; if (text.includes("OR4")) return "Ramp-OR4"; if (text.includes("OR6")) return "Ramp-OR6"; if (text.includes("OR7")) return "Ramp-OR7"; if (text.includes("SR1")) return "Ramp-SR1";
            return rawZone;
        }

        function isExcludedZone(zone) {
            if (!zone) return false;
            return Object.keys(EXCLUDED_ZONES_CONFIG).includes(zone);
        }

        function formatPileName(rawName) {
            const match1 = rawName.match(/(.+)\/(\d+)-dia([\d\.]+)/i);
            if (match1) return `${match1[1]} No.B${match1[2]} (${match1[3]} m.)`;
            const match2 = rawName.match(/(.+)\/(\d+)/i);
            if (match2) return `${match2[1]} No.B${match2[2]}`;
            return rawName;
        }

        // ==========================================
        // 🚀 โหลดข้อมูลแบบ Cross-Matching (ไอเดียพี่เอ็กซ์)
        // ==========================================
        function initMap() {
            map = L.map('map').setView([13.9540, 100.5170], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);

            // โซนห้ามเข้า (จาก V2.1.3)
            L.polygon([[13.9560, 100.5140], [13.9560, 100.5160], [13.9545, 100.5160], [13.9545, 100.5140]], { color: '#ef4444', weight: 3, fillColor: '#f87171', fillOpacity: 0.4 }).addTo(map);
            L.polygon([[13.90133, 100.70020], [13.90124, 100.70025], [13.90107, 100.69962], [13.90118, 100.69957]], { color: '#f97316', weight: 3, fillColor: '#fdba74', fillOpacity: 0.4 }).addTo(map);

            document.getElementById('loading-status').innerHTML = "⏳ 1. กำลังดึงรายชื่อเสาเป้าหมายจากตารางรอดำเนินการ...";

            // สเตป 1: ดึงรายชื่อเสา "บัญชีดำ" จากตาราง Pending
            Papa.parse(PENDING_CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (pendingRes) => {
                    const data = pendingRes.data;
                    const pileConcreteDates = {};
                    
                    // หากำหนดวันเทคอนกรีตเก็บไว้ก่อน
                    data.forEach(row => {
                        const projName = (row['ชื่อโปรเจค'] || '').trim();
                        const task = (row['งานที่ต้องทำ'] || '').trim();
                        const finishDate = (row['วันที่เสร็จงานจริงๆ'] || '').trim();
                        if (projName && task.includes('เจาะเสาเข็ม') && finishDate) {
                            pileConcreteDates[getMatchKey(projName)] = finishDate;
                        }
                    });

                    // กรองเอาเฉพาะเสาที่สถานะ "เลยกำหนด" และเป็นของ Sonic
                    data.forEach(row => {
                        const projName = (row['ชื่อโปรเจค'] || '').trim();
                        const task = (row['งานที่ต้องทำ'] || '').toLowerCase();
                        const status = (row['สถานะ'] || '').trim();
                        
                        if (projName && status === 'เลยกำหนด' && task.includes('sonic')) {
                            const key = getMatchKey(projName);
                            // เก็บเข้าบัญชีดำ
                            pendingPileTargets[key] = {
                                originalName: projName,
                                concreteDate: pileConcreteDates[key] || '-'
                            };
                        }
                    });

                    document.getElementById('loading-status').innerHTML = "⏳ 2. กำลังค้นหาพิกัดเสาจากตารางแผนที่...";

                    // สเตป 2: เปิดไฟล์แผนที่ Bored Pile เพื่อหาค่า ละติจูด/ลองจิจูด มาชนกัน
                    Papa.parse(BORED_PILE_CSV_URL, {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (boredRes) => {
                            processRadarMap(boredRes.data);
                        },
                        error: (err) => {
                            document.getElementById('loading-status').innerHTML = "❌ โหลดไฟล์พิกัดเสาเข็มไม่สำเร็จ";
                        }
                    });
                },
                error: (err) => {
                    document.getElementById('loading-status').innerHTML = "❌ โหลดไฟล์ตาราง Pending ไม่สำเร็จ";
                }
            });
        }

        function processRadarMap(boredData) {
            const tempGroups = {};
            const mapZones = new Set();
            let totalPendingCount = 0;
            let addedPiles = new Set(); // ป้องกันการนับเบิ้ล

            boredData.forEach(row => {
                const rawProjName = (row['ชื่อโปรเจค'] || '').trim();
                const key = getMatchKey(rawProjName);
                
                // 🌟 หัวใจสำคัญ: ถ้ารายชื่อเสานี้ "ตรงกับบัญชีดำ" ที่เรารอเทส
                if (key && pendingPileTargets[key] && !addedPiles.has(key)) {
                    
                    const lat = parseFloat(row['Latitude']);
                    const lng = parseFloat(row['Longitude']);
                    const rawZone = String(row['ผู้รับผิดชอบ'] || 'ไม่ระบุ');
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        const zone = getStandardZoneName(rawZone);
                        if (!isExcludedZone(zone)) {
                            addedPiles.add(key);
                            totalPendingCount++;
                            mapZones.add(zone);

                            // จัดกลุ่มเสา (เช่น 71L/1 -> 71L)
                            let baseName = rawProjName.split('/')[0].trim();
                            const diaIndex = baseName.toLowerCase().indexOf('-dia');
                            if (diaIndex !== -1) baseName = baseName.substring(0, diaIndex).trim();

                            if (!tempGroups[baseName]) {
                                tempGroups[baseName] = { baseName: baseName, zone: zone, lat: lat, lng: lng, piles: [] };
                            }
                            
                            // 🌟 คำนวณอายุคอนกรีต จากวันที่เทใน Pending Table 🌟
                            let cDate = pendingPileTargets[key].concreteDate;
                            if (cDate === '-') cDate = (row['วันที่เสร็จงานจริงๆ'] || '').trim();
                            
                            let ageDays = getDiffDays(cDate);
                            let ageText = ageDays >= 0 ? `อายุ ${ageDays} วัน` : 'เลยกำหนด';

                            tempGroups[baseName].piles.push({ 
                                id: rawProjName, 
                                ageText: ageText,
                                status: rawZone 
                            });
                        }
                    }
                }
            });

            groupedPileData = Object.values(tempGroups);

            // อัปเดตตัวกรองโซน
            const select = document.getElementById('mapZoneFilter');
            select.innerHTML = '<option value="ALL">ภาพรวมทุกโซน</option>';
            const sortedZones = Array.from(mapZones).sort((a, b) => {
                const getRank = (name) => { if (name.startsWith('Zone')) return 1; if (name.startsWith('Ramp')) return 2; return 3; };
                if (getRank(a) !== getRank(b)) return getRank(a) - getRank(b); 
                return (parseInt(a.replace(/[^\d]/g, '')) || 0) - (parseInt(b.replace(/[^\d]/g, '')) || 0);
            });
            sortedZones.forEach(zone => { select.innerHTML += `<option value="${zone}">${zone}</option>`; });

            // อัปเดตป้ายสถานะ (ถ้าได้ 150 ต้น แปลว่าสำเร็จ!)
            const statusBadge = document.getElementById('loading-status');
            statusBadge.className = "bg-red-50 text-red-700 px-5 py-2.5 rounded-lg text-sm font-bold border border-red-200 shadow-sm w-full md:w-auto text-center flex items-center justify-center gap-2";
            statusBadge.innerHTML = `<span class="text-xl">🚨</span> พบเสารอทดสอบ Sonic ทั้งสิ้น ${totalPendingCount} ต้น`;

            renderMap();
        }

        function renderMap() {
            markerLayerGroup.clearLayers();
            const selectedZone = document.getElementById('mapZoneFilter').value;
            let pendingCount = 0; const bounds = []; 

            groupedPileData.forEach(group => {
                if (selectedZone !== 'ALL' && group.zone !== selectedZone) return;

                const totalPiles = group.piles.length;
                pendingCount += totalPiles;

                const customIcon = L.divIcon({ 
                    className: 'custom-marker', 
                    html: `<div style="background-color: #ef4444; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.9;"><span>${totalPiles}</span></div>`, 
                    iconSize: [25, 25] 
                });
                
                const marker = L.marker([group.lat, group.lng], { icon: customIcon });

                let pHTML = '<ul class="mt-2 space-y-1.5 max-h-48 overflow-y-auto custom-scrollbar pr-2">';
                group.piles.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true})).forEach(p => {
                    const icon = '<span class="text-red-500 text-[10px] mt-0.5">🚨</span>';
                    
                    let pileText = `<b class="text-xs text-slate-800">${formatPileName(p.id)}</b>`;
                    let zoneText = p.status && p.status !== 'ไม่ระบุ' ? `<span class="text-[10px] text-orange-500 font-medium whitespace-nowrap ml-1">${p.status}</span>` : '';
                    let dateBadgeClass = "bg-red-100 text-red-700 font-bold border border-red-200 shadow-sm";

                    pHTML += `
                        <li class="text-sm border-b border-slate-100 pb-1.5 pt-1.5 flex justify-between items-center gap-2">
                            <div class="flex items-start gap-1 flex-1">
                                ${icon} 
                                <div class="leading-tight">${pileText} ${zoneText}</div>
                            </div>
                            <span class="text-[10px] px-1.5 py-0.5 rounded ${dateBadgeClass} whitespace-nowrap ml-1">${p.ageText}</span>
                        </li>`;
                }); 
                pHTML += '</ul>';

                marker.bindPopup(`
                    <div class="p-3 min-w-[280px]">
                        <h4 class="font-bold text-lg text-slate-800 border-b border-slate-200 pb-1 mb-2 flex items-center gap-2">📌 กลุ่มเสา: ${group.baseName}</h4>
                        <div class="mb-2 flex justify-between items-center bg-slate-50 p-1.5 rounded-lg border border-slate-100">
                            <span class="px-2 py-0.5 rounded font-bold text-[11px] bg-red-100 text-red-800 shadow-sm">รอทดสอบ Sonic</span>
                            <span class="text-[11px] font-bold text-slate-500">(${totalPiles} ต้น)</span>
                        </div>
                        ${pHTML}
                    </div>
                `);

                markerLayerGroup.addLayer(marker); bounds.push([group.lat, group.lng]);
            });

            document.getElementById('count-pending').innerText = pendingCount;
            
            if (bounds.length > 0) { map.fitBounds(bounds, { padding: [50, 50], maxZoom: 18 }); }
        }

        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
