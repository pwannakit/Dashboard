<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Radar Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .custom-marker {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
        }
        .custom-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-red-500">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🗺️ ทดสอบระบบ Sonic Radar</h1>
                <p class="text-slate-500 text-sm">ดึงฐานข้อมูลเสาเข็มเจาะ โชว์เฉพาะเสาเข็มที่อายุคอนกรีตเกิน 14 วัน</p>
            </div>
            <div id="status-badge" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg font-bold text-sm shadow-sm">
                ⏳ กำลังโหลดข้อมูล...
            </div>
        </div>

        <div class="mb-4">
            <label class="font-bold text-slate-700 mr-2">🔍 เลือกโซน:</label>
            <select id="zoneFilter" onchange="renderMap()" class="p-2 border rounded-lg bg-slate-50 outline-none">
                <option value="ALL">ดูทุกโซน</option>
            </select>
        </div>

        <div id="map" class="w-full rounded-xl border border-slate-300" style="height: 600px;"></div>
    </div>

    <script>
        // 🌟 1. ลิงก์ฐานข้อมูลเสาเข็มเจาะ (Bored Pile)
        const BORED_PILE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_d3Oxo9_vdxQGl2R1aIT8U-2RarYs_Iy2MANCwBi9Dnop58DvSD7tTiRlNf-vRhYupbxeCG4V_Mwc/pub?gid=921370860&single=true&output=csv";

        let map, markerLayerGroup;
        let radarData = []; // เก็บข้อมูลที่กรองแล้วเตรียมวาดลงแผนที่

        // ฟังก์ชันแปลงวันที่ภาษาไทย
        function parseThaiDate(dateStr) {
            if (!dateStr) return null;
            let str = dateStr.toString().trim().replace(/"/g, '');
            let parts = str.split(/[\/\- ]+/); 
            if (parts.length < 3) return null;
            let day = parseInt(parts[0], 10);
            let monthStr = parts[1].trim();
            let year = parseInt(parts[2], 10);
            if (year < 100) year += 2000;
            if (year > 2500) year -= 543;
            const thaiMonths = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };
            let month = thaiMonths[monthStr] !== undefined ? thaiMonths[monthStr] : (parseInt(monthStr, 10) - 1); 
            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
            return new Date(year, month, day, 0, 0, 0, 0);
        }

        // ฟังก์ชันคำนวณอายุคอนกรีต
        function getDiffDays(dateString) {
            const pileDate = parseThaiDate(dateString);
            if (!pileDate) return -1;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = today - pileDate;
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        // ฟังก์ชันจัดฟอร์แมตชื่อ Zone
        function formatZoneName(rawZone) {
            let baseName = String(rawZone || '');
            if(baseName.includes('-')) {
                let parts = baseName.split('-');
                baseName = parts.slice(1).join('-').trim(); 
            }
            let displayZone = baseName;
            const zMatch = baseName.match(/^z0*(\d+)$/i);
            if (zMatch) displayZone = 'Zone ' + zMatch[1];
            else if (/^(or|sr|n)\d+$/i.test(baseName)) displayZone = 'Ramp-' + baseName.toUpperCase();
            return displayZone;
        }

        // 🌟 2. เริ่มต้นวาดแผนที่เปล่าๆ ก่อน
        function initMap() {
            map = L.map('map').setView([13.9540, 100.5170], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);
            
            // โหลดข้อมูลจาก CSV ทันทีที่โหลดแผนที่เสร็จ
            loadData();
        }

        // 🌟 3. โหลดข้อมูล
        function loadData() {
            Papa.parse(BORED_PILE_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processRadarData(results.data);
                },
                error: function(err) {
                    document.getElementById('status-badge').className = "bg-red-100 text-red-800 px-4 py-2 rounded-lg font-bold text-sm";
                    document.getElementById('status-badge').innerHTML = "❌ โหลดข้อมูลไม่สำเร็จ";
                    console.error(err);
                }
            });
        }

        // 🌟 4. คัดกรองข้อมูล (หาเฉพาะต้นที่เทเสร็จแล้ว > 14 วัน)
        function processRadarData(data) {
            const tempMapGroups = {};
            const availableZones = new Set();
            let countQualifiedPiles = 0;

            data.forEach(row => {
                const projName = (row['ชื่อโปรเจค'] || '').trim();
                const finishDate = (row['วันที่เสร็จงานจริงๆ'] || '').trim();
                const rawZone = String(row['ผู้รับผิดชอบ'] || 'ไม่ระบุ');
                const lat = parseFloat(row['Latitude']);
                const lng = parseFloat(row['Longitude']);

                // เช็คว่ากรอกวันเทคอนกรีต และ มีพิกัดหรือไม่
                if (projName && finishDate.length > 2 && !isNaN(lat) && !isNaN(lng)) {
                    const ageDays = getDiffDays(finishDate);
                    
                    // 🚨 กฎเหล็ก: โชว์เฉพาะอายุเกิน 14 วัน
                    if (ageDays > 14) {
                        countQualifiedPiles++;
                        const zone = formatZoneName(rawZone);
                        availableZones.add(zone);

                        // จัดกลุ่มเสาเข็มที่อยู่หมุดเดียวกัน (เช่น 89L)
                        let baseName = projName.split('/')[0].trim();
                        const diaIndex = baseName.toLowerCase().indexOf('-dia');
                        if (diaIndex !== -1) baseName = baseName.substring(0, diaIndex).trim();

                        if (!tempMapGroups[baseName]) {
                            tempMapGroups[baseName] = { baseName: baseName, zone: zone, lat: lat, lng: lng, piles: [] };
                        }
                        tempMapGroups[baseName].piles.push({ id: projName, age: ageDays });
                    }
                }
            });

            radarData = Object.values(tempMapGroups);

            // อัปเดตตัวเลือก Zone ใน Dropdown
            const select = document.getElementById('zoneFilter');
            select.innerHTML = '<option value="ALL">ดูทุกโซน</option>';
            Array.from(availableZones).sort().forEach(zone => {
                select.innerHTML += `<option value="${zone}">${zone}</option>`;
            });

            // อัปเดตสถานะให้ผู้ใช้รู้
            document.getElementById('status-badge').className = "bg-emerald-100 text-emerald-800 px-4 py-2 rounded-lg font-bold text-sm";
            document.getElementById('status-badge').innerHTML = `✅ พบเสารอเทส ${countQualifiedPiles} ต้น`;

            // สั่งวาดแผนที่
            renderMap();
        }

        // 🌟 5. วาดหมุดลงบนแผนที่
        function renderMap() {
            markerLayerGroup.clearLayers();
            const selectedZone = document.getElementById('zoneFilter').value;
            const bounds = []; 

            radarData.forEach(group => {
                // ถ้าเลือกกรองโซน แล้วโซนไม่ตรง ให้ข้ามไป
                if (selectedZone !== 'ALL' && group.zone !== selectedZone) return;

                const totalPiles = group.piles.length;

                // สร้างไอคอนหมุดสีแดง
                const customIcon = L.divIcon({ 
                    className: 'custom-marker', 
                    html: `<div style="background-color: #ef4444; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.9;"><span>${totalPiles}</span></div>`, 
                    iconSize: [25, 25] 
                });
                
                const marker = L.marker([group.lat, group.lng], { icon: customIcon });

                // สร้างรายละเอียดข้างใน Popup
                let pHTML = '<ul class="mt-2 space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-2">';
                
                group.piles.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true})).forEach(p => {
                    // จัดฟอร์แมตชื่อให้สวยงาม (ตัด -dia ออก)
                    let pileName = p.id;
                    const m1 = pileName.match(/(.+)\/(\d+)-dia([\d\.]+)/i);
                    if (m1) pileName = `${m1[1]} No.B${m1[2]} (${m1[3]} m.)`;
                    else { 
                        const m2 = pileName.match(/(.+)\/(\d+)/i); 
                        if (m2) pileName = `${m2[1]} No.B${m2[2]}`; 
                    }
                    
                    pHTML += `
                        <li class="text-sm text-slate-700 border-b border-slate-100 pb-1 flex justify-between items-center">
                            <span class="flex items-center gap-1"><span class="text-red-500 text-[10px]">⏳</span> <b>${pileName}</b></span>
                            <span class="text-[10px] text-orange-600 font-bold bg-orange-100 border border-orange-200 px-1.5 py-0.5 rounded">${p.age} วัน</span>
                        </li>`;
                }); 
                pHTML += '</ul>';

                marker.bindPopup(`
                    <div class="p-3 min-w-[220px]">
                        <h4 class="font-bold text-lg text-slate-800 border-b border-slate-200 pb-1 mb-2">📌 กลุ่มเสา: ${group.baseName}</h4>
                        <div class="mb-2 flex justify-between items-center">
                            <span class="px-2 py-0.5 rounded font-bold text-[11px] bg-red-100 text-red-800">รอทดสอบ Sonic</span>
                            <span class="text-[11px] font-bold text-slate-500">(${totalPiles} ต้น)</span>
                        </div>
                        ${pHTML}
                    </div>
                `);

                markerLayerGroup.addLayer(marker); 
                bounds.push([group.lat, group.lng]);
            });

            // ซูมแผนที่ให้ครอบคลุมหมุดทั้งหมด
            if (bounds.length > 0) { 
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 18 }); 
            }
        }

        // สั่งให้เริ่มทำงานทันทีที่โหลดหน้าเว็บเสร็จ
        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
