<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Radar Prototype (Zone Logic V2.1.3)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .custom-marker {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
            transition: transform 0.2s;
        }
        .custom-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-red-500">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b pb-4 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🗺️ ทดสอบระบบ Sonic Radar</h1>
                <p class="text-slate-500 text-sm">ดึงฐานข้อมูลเสาเข็มเจาะ โชว์เฉพาะเสาเข็มที่อายุคอนกรีตเกิน 14 วัน (ใช้ลอจิกโซน V2.1.3)</p>
            </div>
            <div id="status-badge" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg font-bold text-sm shadow-sm w-full md:w-auto text-center">
                ⏳ กำลังโหลดข้อมูล...
            </div>
        </div>

        <div class="mb-4 flex items-center gap-3">
            <label class="font-bold text-slate-700">🔍 เลือกโซน:</label>
            <select id="zoneFilter" onchange="renderMap()" class="p-2 border border-slate-300 rounded-lg bg-slate-50 outline-none text-sm min-w-[150px] focus:border-red-500">
                <option value="ALL">ดูทุกโซน</option>
            </select>
        </div>

        <div id="map" class="w-full rounded-xl border border-slate-300" style="height: 600px;"></div>
    </div>

    <script>
        // ================= 🌟 ตั้งค่าลอจิกจาก V2.1.3 🌟 =================
        const EXCLUDED_ZONES_CONFIG = {
            "เข็ม-แซม (Re-Drilling Pile)": ["แซม", "เข็มแซม", "เข็ม-แซม"],
            "ยังไม่เริ่ม-เจาะ (Not Started)": ["ยังไม่เริ่ม", "ยังไม่เริ่มเจาะ", "ยังไม่เริ่ม-เจาะ"],
            "พบปัญหา-รอแก้ไข (Pending Fix)": ["พบปัญหา", "รอแก้ไข", "ติดปัญหา"]
        };

        const BORED_PILE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_d3Oxo9_vdxQGl2R1aIT8U-2Rar পুলিশের_Iy2MANCwBi9Dnop58DvSD7tTiRlNf-vRhYupbxeCG4V_Mwc/pub?gid=921370860&single=true&output=csv";

        let map, markerLayerGroup;
        let radarData = []; 

        function parseThaiDate(dateStr) {
            if (!dateStr) return null;
            let str = dateStr.toString().trim().replace(/"/g, '');
            let parts = str.split(/[\/\- ]+/); 
            if (parts.length < 3) return null;
            let day = parseInt(parts[0], 10);
            let monthStr = parts[1].trim();
            let year = parseInt(parts[2], 10);
            if (year < 100) year += 2000;
            if (year > 2500) year -= 543;
            const thaiMonths = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };
            let month = thaiMonths[monthStr] !== undefined ? thaiMonths[monthStr] : (parseInt(monthStr, 10) - 1); 
            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
            return new Date(year, month, day, 0, 0, 0, 0);
        }

        function getDiffDays(dateString) {
            const pileDate = parseThaiDate(dateString);
            if (!pileDate) return -1;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = today - pileDate;
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        // 🌟 ดึงฟังก์ชันตั้งชื่อและกรองโซนฉบับสมบูรณ์มาจาก V2.1.3
        function getStandardZoneName(rawZone) {
            if (!rawZone) return 'ไม่ระบุ';
            const text = String(rawZone).toUpperCase().replace(/\s+/g, '');
            
            for (const [standardName, keywords] of Object.entries(EXCLUDED_ZONES_CONFIG)) {
                if (keywords.some(kw => text.includes(kw.toUpperCase().replace(/\s+/g, '')))) {
                    return standardName;
                }
            }
            
            if (text.includes("ZONE1")) return "Zone 1"; if (text.includes("ZONE2")) return "Zone 2"; if (text.includes("ZONE3")) return "Zone 3"; if (text.includes("ZONE4")) return "Zone 4"; if (text.includes("ZONE5")) return "Zone 5"; if (text.includes("ZONE6")) return "Zone 6"; if (text.includes("ZONE7")) return "Zone 7";
            if (text.includes("N01")) return "Ramp-N01"; if (text.includes("OR3")) return "Ramp-OR3"; if (text.includes("OR4")) return "Ramp-OR4"; if (text.includes("OR6")) return "Ramp-OR6"; if (text.includes("OR7")) return "Ramp-OR7"; if (text.includes("SR1")) return "Ramp-SR1";
            
            return rawZone;
        }

        function isExcludedZone(zone) {
            if (!zone) return false;
            return Object.keys(EXCLUDED_ZONES_CONFIG).includes(zone);
        }

        // ================= MAP INIT & DATA LOAD =================
        function initMap() {
            map = L.map('map').setView([13.9540, 100.5170], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);
            
            // วาดพื้นที่ห้ามเข้า (อ้างอิงจาก V2.1.3)
            const redZone = L.polygon([[13.9560, 100.5140], [13.9560, 100.5160], [13.9545, 100.5160], [13.9545, 100.5140]], { color: '#ef4444', weight: 3, fillColor: '#f87171', fillOpacity: 0.4 }).addTo(map);
            redZone.bindPopup(`<div class="text-center p-2"><div class="text-3xl mb-1">⛔</div><h4 class="font-bold text-red-600 text-base">โซนอันตราย 1</h4></div>`);

            const orangeZone = L.polygon([[13.90133, 100.70020], [13.90124, 100.70025], [13.90107, 100.69962], [13.90118, 100.69957]], { color: '#f97316', weight: 3, fillColor: '#fdba74', fillOpacity: 0.4 }).addTo(map);
            orangeZone.bindPopup(`<div class="text-center p-2"><div class="text-3xl mb-1">🚧</div><h4 class="font-bold text-orange-600 text-base">โซนเฝ้าระวัง</h4></div>`);

            loadData();
        }

        function loadData() {
            // ซ่อมแซม URL เล็กน้อยเพื่อป้องกัน Error ในการ copy
            const CLEAN_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_d3Oxo9_vdxQGl2R1aIT8U-2RarYs_Iy2MANCwBi9Dnop58DvSD7tTiRlNf-vRhYupbxeCG4V_Mwc/pub?gid=921370860&single=true&output=csv";
            
            Papa.parse(CLEAN_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processRadarData(results.data);
                },
                error: function(err) {
                    document.getElementById('status-badge').className = "bg-red-100 text-red-800 px-4 py-2 rounded-lg font-bold text-sm shadow-sm w-full md:w-auto text-center";
                    document.getElementById('status-badge').innerHTML = "❌ โหลดข้อมูลไม่สำเร็จ";
                    console.error(err);
                }
            });
        }

        function processRadarData(data) {
            const tempMapGroups = {};
            const mapZones = new Set();
            let countQualifiedPiles = 0;

            data.forEach(row => {
                const projName = (row['ชื่อโปรเจค'] || '').trim();
                const finishDate = (row['วันที่เสร็จงานจริงๆ'] || '').trim();
                const rawZone = String(row['ผู้รับผิดชอบ'] || 'ไม่ระบุ');
                const lat = parseFloat(row['Latitude']);
                const lng = parseFloat(row['Longitude']);

                if (projName && finishDate.length > 2 && !isNaN(lat) && !isNaN(lng)) {
                    const ageDays = getDiffDays(finishDate);
                    
                    // 🌟 ใช้ V2.1.3 Logic สำหรับจัดฟอร์แมตโซน
                    const zone = getStandardZoneName(rawZone); 

                    // 🚨 กฎเหล็ก: โชว์เฉพาะอายุเกิน 14 วัน และ ไม่ใช่โซนที่ถูกกันออก (เช่น เข็มแซม)
                    if (ageDays > 14 && !isExcludedZone(zone)) {
                        countQualifiedPiles++;
                        mapZones.add(zone);

                        let baseName = projName.split('/')[0].trim();
                        const diaIndex = baseName.toLowerCase().indexOf('-dia');
                        if (diaIndex !== -1) baseName = baseName.substring(0, diaIndex).trim();

                        if (!tempMapGroups[baseName]) {
                            tempMapGroups[baseName] = { baseName: baseName, zone: zone, lat: lat, lng: lng, piles: [] };
                        }
                        tempMapGroups[baseName].piles.push({ id: projName, age: ageDays });
                    }
                }
            });

            radarData = Object.values(tempMapGroups);

            const select = document.getElementById('zoneFilter');
            select.innerHTML = '<option value="ALL">ดูทุกโซน</option>';
            
            // 🌟 ใช้ V2.1.3 Logic เรียงลำดับโซน (Zone 1-7 แล้วตามด้วย Ramp)
            const sortedZones = Array.from(mapZones).sort((a, b) => {
                const getRank = (name) => { if (name.startsWith('Zone')) return 1; if (name.startsWith('Ramp')) return 2; return 3; };
                if (getRank(a) !== getRank(b)) return getRank(a) - getRank(b); 
                return (parseInt(a.replace(/[^\d]/g, '')) || 0) - (parseInt(b.replace(/[^\d]/g, '')) || 0);
            });
            
            sortedZones.forEach(zone => {
                select.innerHTML += `<option value="${zone}">${zone}</option>`;
            });

            document.getElementById('status-badge').className = "bg-emerald-100 text-emerald-800 px-4 py-2 rounded-lg font-bold text-sm shadow-sm w-full md:w-auto text-center";
            document.getElementById('status-badge').innerHTML = `✅ พบเสารอเทส ${countQualifiedPiles} ต้น`;

            renderMap();
        }

        function renderMap() {
            markerLayerGroup.clearLayers();
            const selectedZone = document.getElementById('zoneFilter').value;
            const bounds = []; 

            radarData.forEach(group => {
                if (selectedZone !== 'ALL' && group.zone !== selectedZone) return;

                const totalPiles = group.piles.length;

                const customIcon = L.divIcon({ 
                    className: 'custom-marker', 
                    html: `<div style="background-color: #ef4444; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.9;"><span>${totalPiles}</span></div>`, 
                    iconSize: [25, 25] 
                });
                
                const marker = L.marker([group.lat, group.lng], { icon: customIcon });

                let pHTML = '<ul class="mt-2 space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-2">';
                
                group.piles.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true})).forEach(p => {
                    let pileName = p.id;
                    const m1 = pileName.match(/(.+)\/(\d+)-dia([\d\.]+)/i);
                    if (m1) pileName = `${m1[1]} No.B${m1[2]} (${m1[3]} m.)`;
                    else { 
                        const m2 = pileName.match(/(.+)\/(\d+)/i); 
                        if (m2) pileName = `${m2[1]} No.B${m2[2]}`; 
                    }
                    
                    pHTML += `
                        <li class="text-sm text-slate-700 border-b border-slate-100 pb-1 flex justify-between items-center">
                            <span class="flex items-center gap-1"><span class="text-red-500 text-[10px]">⏳</span> <b>${pileName}</b></span>
                            <span class="text-[10px] text-orange-600 font-bold bg-orange-100 border border-orange-200 px-1.5 py-0.5 rounded shadow-sm">${p.age} วัน</span>
                        </li>`;
                }); 
                pHTML += '</ul>';

                marker.bindPopup(`
                    <div class="p-3 min-w-[220px]">
                        <h4 class="font-bold text-lg text-slate-800 border-b border-slate-200 pb-1 mb-2">📌 กลุ่มเสา: ${group.baseName}</h4>
                        <div class="mb-2 flex justify-between items-center">
                            <span class="px-2 py-0.5 rounded font-bold text-[11px] bg-red-100 text-red-800">รอทดสอบ Sonic</span>
                            <span class="text-[11px] font-bold text-slate-500">(${totalPiles} ต้น)</span>
                        </div>
                        ${pHTML}
                    </div>
                `);

                markerLayerGroup.addLayer(marker); 
                bounds.push([group.lat, group.lng]);
            });

            if (bounds.length > 0) { 
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 18 }); 
            }
        }

        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
