<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module: Pending Piles Sonic</title>
    <!-- โหลดฟอนต์ Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } }
            }
        }
    </script>
    <!-- โหลด Chart.js และ PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-card { 
            background: rgba(30, 41, 59, 0.95); 
            border-color: rgba(51, 65, 85, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        /* Transition สำหรับระบบซ่อน/แสดง ตารางต่างๆ */
        .collapsible-content {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out, margin 0.4s ease-in-out, padding 0.4s ease-in-out;
            overflow: hidden;
            max-height: 3500px; 
            opacity: 1;
        }
        .collapsible-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
        }
    </style>
</head>
<!-- 🟢 อัปเดตสีพื้นหลังของ Body ตามมาตรฐาน -->
<body class="p-8 text-slate-800 bg-slate-50 dark:bg-slate-900 dark:text-slate-100">

    <div class="max-w-5xl mx-auto glass-card p-6">
        <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-4">
            <!-- 🟢 อัปเดต Page Title ใช้สี Indigo -->
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-900 dark:text-indigo-400 flex items-center gap-2">
                <span>⏳</span> เสาเข็มรอดำเนินการทดสอบ Sonic Logging
            </h2>
            <button onclick="togglePendingSection()" id="toggle-pending-btn" class="bg-red-50 dark:bg-slate-700 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-colors border border-red-200 dark:border-slate-600 flex items-center gap-1 shadow-sm">
                🔽 ซ่อนเนื้อหา
            </button>
        </div>
        
        <div id="pending-content" class="collapsible-content pt-6">
            <div id="status-message" class="mb-6 p-4 rounded-lg bg-indigo-100 text-indigo-800 dark:bg-indigo-900/50 dark:text-indigo-300 font-bold text-center shadow-sm">
                กำลังดึงข้อมูลเสาเข็มที่รอทดสอบ... ⏳
            </div>

            <!-- พื้นที่แสดงกราฟ -->
            <div class="relative w-full mb-8" style="height: 400px;">
                <canvas id="pendingChart"></canvas>
            </div>
            
            <!-- ตารางรายละเอียด -->
            <div>
                <!-- 🟢 อัปเดต Section Title <h3> ใช้ text-xl และสี Slate -->
                <h3 class="text-xl font-bold mb-3 text-slate-800 dark:text-white flex items-center flex-wrap">
                    📋 เสาเข็มรอดำเนินงานทดสอบ (อายุคอนกรีตเกิน 14 วัน)
                    <span id="tableFilterStatus" class="ml-2 flex items-center"></span>
                </h3>
                <div class="overflow-auto rounded-lg border border-slate-200 dark:border-slate-700 max-h-80 shadow-sm">
                    <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700">
                        <thead class="bg-slate-100 dark:bg-slate-800 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-bold text-slate-600 dark:text-slate-300 w-1/4">ชื่อเสาเข็ม</th>
                                <th class="px-4 py-3 text-left text-sm font-bold text-slate-600 dark:text-slate-300 w-1/4">โซนพื้นที่</th>
                                <th class="px-4 py-3 text-left text-sm font-bold text-slate-600 dark:text-slate-300 w-1/4">งานที่ต้องทำ</th>
                                <th class="px-4 py-3 text-left text-sm font-bold text-slate-600 dark:text-slate-300 w-1/4">สถานะล่าสุด</th>
                            </tr>
                        </thead>
                        <tbody id="pendingTable" class="bg-white dark:bg-slate-900 divide-y divide-slate-100 dark:divide-slate-800 text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let pendingChartInstance = null;
        let currentTableData = []; 
        
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzJ44c5wXJlotG5S0SsFqlEncFgYDrhMbjDlJvgN1j_fgnjwPC8p8FnNquiTwQ_FGytzP81jZ1kICG/pub?gid=921370860&single=true&output=csv";

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                document.getElementById('status-message').style.display = 'none';
                processPendingData(results.data);
            },
            error: function(err) {
                const st = document.getElementById('status-message');
                st.className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 font-bold text-center shadow-sm";
                st.innerText = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล: " + err;
            }
        });

        function togglePendingSection() {
            const container = document.getElementById('pending-content');
            const btn = document.getElementById('toggle-pending-btn');
            
            container.classList.toggle('collapsed');
            
            if(container.classList.contains('collapsed')) {
                btn.innerHTML = '▶️ แสดงเนื้อหา';
                btn.className = 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold transition-colors border border-slate-300 dark:border-slate-600 flex items-center gap-1 shadow-sm';
            } else {
                btn.innerHTML = '🔽 ซ่อนเนื้อหา';
                btn.className = 'bg-red-50 dark:bg-slate-700 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-colors border border-red-200 dark:border-slate-600 flex items-center gap-1 shadow-sm';
            }
        }

        function formatZoneName(rawZone) {
            let baseName = rawZone.trim();
            if(baseName.includes('-')) {
                baseName = baseName.split('-').slice(1).join('-').trim(); 
            }
            let displayZone = baseName;
            const zMatch = baseName.match(/^z0*(\d+)$/i);
            
            if (zMatch) {
                displayZone = 'Zone ' + zMatch[1];
            } else if (/^(or|sr|n)\d+$/i.test(baseName)) { 
                displayZone = 'Ramp-' + baseName.toUpperCase();
            }
            return displayZone;
        }

        function processPendingData(data) {
            const zoneStats = {};
            currentTableData = [];

            data.forEach(row => {
                const projName = row['ชื่อโปรเจค'] || '';
                let task = row['งานที่ต้องทำ'] || 'ไม่ระบุ';
                const rawZone = row['ผู้รับผิดชอบ'] || 'ไม่ระบุ';
                const status = (row['สถานะ'] || '').trim();

                if (!projName || status !== 'เลยกำหนด') {
                    return; 
                }

                const zone = formatZoneName(rawZone);
                const cleanProjName = projName.split(/-dia/i)[0].trim();
                
                let chartTask = task;
                let tableTask = task;
                if (task.toLowerCase().includes('sonic')) {
                    chartTask = 'เสาเข็มอายุคอนกรีตเกิน 14 วัน';
                    tableTask = 'Sonic Logging Test';
                }
                const displayStatus = 'อายุคอนกรีตเกิน 14 วัน';

                if (!zoneStats[zone]) zoneStats[zone] = {};
                if (!zoneStats[zone][chartTask]) zoneStats[zone][chartTask] = 0;
                zoneStats[zone][chartTask]++;

                currentTableData.push({
                    name: cleanProjName,
                    zone: zone,
                    task: tableTask,        
                    chartTask: chartTask,   
                    status: displayStatus
                });
            });

            currentTableData.sort((a, b) => a.name.localeCompare(b.name, 'th', { numeric: true, sensitivity: 'base' }));

            drawPendingChart(zoneStats);
            renderTable(); 
        }

        function renderTable(filterZone = null, filterTask = null) {
            const tbody = document.getElementById('pendingTable');
            const statusText = document.getElementById('tableFilterStatus');
            tbody.innerHTML = '';
            
            let filteredData = currentTableData;
            
            if (filterZone || filterTask) {
                if (filterZone) filteredData = filteredData.filter(d => d.zone === filterZone);
                if (filterTask) filteredData = filteredData.filter(d => d.chartTask === filterTask); 
                
                let filterLabels = [];
                if (filterZone) filterLabels.push(filterZone);
                if (filterTask) {
                    let displayFilterTask = filterTask === 'เสาเข็มอายุคอนกรีตเกิน 14 วัน' ? 'Sonic Logging Test' : filterTask;
                    filterLabels.push(displayFilterTask);
                }
                
                statusText.innerHTML = `
                    <span class="text-blue-600 dark:text-blue-400 text-sm font-normal bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded ml-2 border border-blue-200 dark:border-blue-800 mr-3">
                        (กำลังกรอง: ${filterLabels.join(' | ')})
                    </span> 
                    <button class="cursor-pointer inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-700 border border-emerald-300 px-3 py-1 rounded-lg hover:bg-emerald-100 transition-colors text-sm font-bold dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-700 shadow-sm" onclick="renderTable()">
                        📊 ภาพรวมทุกโซน (Summary)
                    </button>
                `;
            } else {
                statusText.innerHTML = `<span class="text-slate-400 text-sm font-normal ml-2">(แสดงข้อมูลทั้งหมด)</span>`;
            }

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-slate-500">✅ ไม่มีข้อมูลในหมวดหมู่นี้</td></tr>`;
                return;
            }

            filteredData.forEach(d => {
                // 🟢 สีข้อความในตาราง คุมโทน Slate และสถานะใช้สี Orange
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors border-b border-slate-100 dark:border-slate-800/50 last:border-0">
                        <td class="px-4 py-3 font-bold text-slate-800 dark:text-slate-200">📌 ${d.name}</td>
                        <td class="px-4 py-3 font-medium text-slate-700 dark:text-slate-300">${d.zone}</td>
                        <td class="px-4 py-3 text-slate-600 dark:text-slate-400">${d.task}</td>
                        <td class="px-4 py-3 font-bold text-orange-500 dark:text-orange-400">${d.status}</td>
                    </tr>
                `;
            });
        }

        function drawPendingChart(zoneStats) {
            const sortedZones = Object.keys(zoneStats).sort((a, b) => {
                const getRank = (name) => {
                    if (name.startsWith('Zone')) return 1;
                    if (name.startsWith('Ramp')) return 2;
                    return 3;
                };
                const rankA = getRank(a);
                const rankB = getRank(b);
                if (rankA !== rankB) return rankA - rankB; 
                
                const numA = parseInt(a.replace(/[^\d]/g, ''), 10) || 0;
                const numB = parseInt(b.replace(/[^\d]/g, ''), 10) || 0;
                const textA = a.replace(/[\d]/g, '');
                const textB = b.replace(/[\d]/g, '');
                if (textA === textB) return numA - numB;
                return a.localeCompare(b);
            });

            const allTasks = new Set();
            sortedZones.forEach(z => {
                Object.keys(zoneStats[z]).forEach(t => allTasks.add(t));
            });
            const taskArray = Array.from(allTasks).sort();

            const colors = [
                { bg: 'rgba(239, 68, 68, 0.8)', border: 'rgb(239, 68, 68)' },
                { bg: 'rgba(249, 115, 22, 0.8)', border: 'rgb(249, 115, 22)' },
                { bg: 'rgba(16, 185, 129, 0.8)', border: 'rgb(16, 185, 129)' },
                { bg: 'rgba(59, 130, 246, 0.8)', border: 'rgb(59, 130, 246)' }
            ];

            const datasets = taskArray.map((task, index) => {
                const color = colors[index % colors.length];
                return {
                    label: task,
                    data: sortedZones.map(z => zoneStats[z][task] || 0),
                    backgroundColor: color.bg,
                    borderColor: color.border,
                    borderWidth: 1,
                    borderRadius: 4
                };
            });

            const ctx = document.getElementById('pendingChart').getContext('2d');
            if (pendingChartInstance) pendingChartInstance.destroy();

            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#cbd5e1' : '#475569';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            pendingChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedZones,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements, chart) => {
                        if (elements.length > 0) {
                            const firstPoint = elements[0];
                            const selectedZone = chart.data.labels[firstPoint.index];
                            const selectedTask = chart.data.datasets[firstPoint.datasetIndex].label;
                            renderTable(selectedZone, selectedTask);
                        } else {
                            renderTable();
                        }
                    },
                    onHover: (event, chartElement) => {
                        event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default';
                    },
                    plugins: {
                        legend: {
                            labels: { color: textColor, font: { family: 'Sarabun', size: 14 } }
                        },
                        tooltip: { titleFont: { family: 'Sarabun' }, bodyFont: { family: 'Sarabun' } },
                        datalabels: {
                            anchor: 'center', 
                            align: 'center',
                            color: '#ffffff',
                            font: { family: 'Sarabun', weight: 'bold', size: 14 },
                            formatter: function(value) { return value > 0 ? value : ''; }
                        }
                    },
                    layout: { padding: { top: 30 } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: textColor, font: { family: 'Sarabun' }, stepSize: 1 },
                            grid: { color: gridColor }
                        },
                        x: {
                            ticks: { color: textColor, font: { family: 'Sarabun', size: 12 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
